name: Sync Database to HMS Nexus

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hms-nexus-database
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Merge Videos
        run: node scripts/merge-videos.js

      - name: Merge Formulae
        run: node scripts/merge-formulae.js

      - name: Merge Penalties
        run: node scripts/merge-penalties.js

      - name: Merge Textbooks
        run: node scripts/merge-textbooks.js

      - name: Merge ICSI Supplements
        run: node scripts/merge-icsi-supplements.js

      - name: Merge Procedures
        run: node scripts/merge-procedures.js

      - name: Merge News
        run: node scripts/merge-news.js

      - name: Merge Legal Maxims
        run: node scripts/merge-legal-maxims.js

      - name: Merge Glossary
        run: node scripts/merge-glossary.js

      - name: Merge Sections
        run: node scripts/merge-sections.js

      - name: Merge Forms
        run: node scripts/merge-forms.js

      - name: Merge Drafting
        run: node scripts/merge-drafting.js

      - name: Merge Flowcharts
        run: node scripts/merge-flowcharts.js

      - name: Merge Summary
        run: node scripts/merge-summary.js

      - name: Merge Comparison
        run: node scripts/merge-comparison.js

      - name: Merge Case Laws
        run: node scripts/merge-case-laws.js

      - name: Merge PY Question Papers
        run: node scripts/merge-py-question-papers.js

      - name: Merge Notes
        run: node scripts/merge-notes.js

      - name: Merge MCQ
        run: node scripts/merge-mcq.js

      - name: Clone hms-nexus
        run: |
          git clone https://x-access-token:${{ secrets.HMS_NEXUS_TOKEN }}@github.com/24sports-net/hms-nexus.git

      - name: Copy merged JSON
        run: |
          cp output/videos.json hms-nexus/Database/videos.json
          cp output/formulae.json hms-nexus/Database/formulae.json
          cp output/penalties.json hms-nexus/Database/penalties.json
          cp output/textbooks.json hms-nexus/Database/textbooks.json
          cp output/icsi-supplements.json hms-nexus/Database/icsi-supplements.json
          cp output/procedures.json hms-nexus/Database/procedures.json
          cp output/news.json hms-nexus/Database/news.json
          cp output/legal-maxims.json hms-nexus/Database/legal-maxims.json
          cp output/glossary.json hms-nexus/Database/glossary.json
          cp output/sections.json hms-nexus/Database/sections.json
          cp output/forms.json hms-nexus/Database/forms.json
          cp output/drafting.json hms-nexus/Database/drafting.json
          cp output/flowcharts.json hms-nexus/Database/flowcharts.json
          cp output/summary.json hms-nexus/Database/summary.json
          cp output/comparison.json hms-nexus/Database/comparison.json
          cp output/case-laws.json hms-nexus/Database/case-laws.json
          cp output/py-question-papers.json hms-nexus/Database/py-question-papers.json
          cp output/notes.json hms-nexus/Database/notes.json
          cp output/mcq.json hms-nexus/Database/mcq.json

      - name: Commit and Push
        run: |
          cd hms-nexus

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            Database/videos.json \
            Database/formulae.json \
            Database/penalties.json \
            Database/textbooks.json \
            Database/icsi-supplements.json \
            Database/procedures.json \
            Database/news.json \
            Database/legal-maxims.json \
            Database/glossary.json \
            Database/sections.json \
            Database/forms.json \
            Database/drafting.json \
            Database/flowcharts.json \
            Database/summary.json \
            Database/comparison.json \
            Database/case-laws.json \
            Database/py-question-papers.json \
            Database/notes.json \
            Database/mcq.json \

          git diff --cached --quiet || (
            git commit -m "Auto update database"
            git push
          )
