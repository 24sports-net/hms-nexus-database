name: Sync Database to HMS Nexus

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hms-nexus-database
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Merge JSON files
      - name: Merge Videos
        run: node scripts/merge-videos.js

      - name: Merge Formulae
        run: node scripts/merge-formulae.js

      - name: Merge Penalties
        run: node scripts/merge-penalties.js

      # Clone destination repository
      - name: Clone hms-nexus
        run: |
          git clone https://x-access-token:${{ secrets.HMS_NEXUS_TOKEN }}@github.com/24sports-net/hms-nexus.git

      # Copy merged JSON files
      - name: Copy merged JSON
        run: |
          cp output/videos.json hms-nexus/Database/videos.json
          cp output/formulae.json hms-nexus/Database/formulae.json
          cp output/penalties.json hms-nexus/Database/penalties.json

      # Commit and Push
      - name: Commit and Push
        run: |
          cd hms-nexus

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git remote set-url origin https://x-access-token:${{ secrets.HMS_NEXUS_TOKEN }}@github.com/24sports-net/hms-nexus.git

          git add Database/videos.json
          git add Database/formulae.json
          git add Database/penalties.json

          git diff --cached --quiet || (
            git commit -m "Auto update database"
            git push origin main
          )
